<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forms | Burt</title>

<link rel="stylesheet" href="/assets/css/style.css">
<script defer src="/assets/js/script.js"></script>

</head>

<body>

<div id="navbar"></div>

<section class="forms-page">

    <aside class="forms-sidebar">

        <h2>Forms</h2>

        <button class="sidebar-btn active" data-category="all">All Forms</button>
<button class="sidebar-btn" data-category="faq">FAQ</button>
<button class="sidebar-btn" data-category="bugs">Bug Reports</button>
<button class="sidebar-btn" data-category="team">Join Our Team</button>
<button class="sidebar-btn" data-category="other">Other</button>

    </aside>

    <main class="forms-content">

        <div class="forms-top">

            <h1>Community Forms</h1>

            <input
                type="text"
                class="forms-search"
                placeholder="Search forms..."
            >

        </div>

        <div class="forms-grid">

            <div class="form-card" data-category="FAQ">

                <div class="status open"></div>

                <h3>Order a Meme</h3>

                <p>
                    Submit a custom meme request with your image, prompt and delivery preferences.
                </p>

                <button onclick="location.href='/order/checkout/'">
                    Open Form
                </button>

            </div>

        </div>

    </main>

</section>

<div id="footer"></div>

</body>
</html>

</body>
</html>
