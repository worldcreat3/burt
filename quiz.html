<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Practice Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="quiz.js"></script>

<style>

body{
font-family:'DM Sans',sans-serif;
background:#f6f3ee;
margin:0;
padding:40px 20px;
color:#1b1b1b;
}

.page{
max-width:650px;
margin:auto;
}

h1{
font-family:'Fraunces',serif;
margin-bottom:6px;
}

p{
color:#666;
margin-bottom:30px;
}

.card{
background:rgb(224, 236, 211);
border:1px solid #6d7e6a;
border-radius:14px;
padding:18px;
margin-bottom:16px;
}

textarea,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:6px;
font-size:14px;
}

.row{
display:flex;
gap:10px;
}

button{
cursor:pointer;
border:none;
border-radius:8px;
padding:11px;
font-size:15px;
}

.generate{
width:100%;
background:#2d5a3d;
color:rgb(182, 202, 170);
margin-top:10px;
}

.option{
padding:10px;
border:1px solid #708d68;
border-radius:8px;
margin-top:6px;
cursor:pointer;
}

.option:hover{
background:#4e6848;
}

.correct{
background:#e6f4ea;
border-color:#2d5a3d;
}

.wrong{
background:#ce9d9d;
border-color:#cc4444;
}

.score{
background:#8fb89a;
padding:10px;
border-radius:8px;
margin-bottom:16px;
display:flex;
justify-content:space-between;
}

.explanation{
margin-top:8px;
font-size:13px;
color:#555;
}

</style>
</head>

<body>

<div class="page">

<h1>AI Practice Quiz</h1>
<p>Enter a topic and generate questions.</p>

<div class="card">

<label>Topic</label>
<textarea id="topic" placeholder="Photosynthesis, Algebra, WW2..."></textarea>

<div class="row">

<div style="flex:1">
<label>Questions</label>
<select id="numQ">
<option>1</option>
<option>3</option>
<option selected>5</option>
<option>8</option>
<option>10</option>
</select>
</div>

<div style="flex:1">
<label>Difficulty</label>
<select id="diff">
<option>easy 😀</option>
<option selected>medium 😭</option>
<option>hard ☠️</option>
</select>
</div>

</div>

<button id="generateBtn" onclick="generate()">Generate Questions</button>

</div>

<div id="quiz"></div>

</div>
</body>
</html>
